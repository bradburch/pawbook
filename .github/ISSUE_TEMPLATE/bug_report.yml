name: Bug report
description: Report a problem with Pawservation
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please do not include secrets or tokens.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: The release tag or commit SHA you are running.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, browser, local dev vs. deployed Worker, etc.
    validations:
      required: false
